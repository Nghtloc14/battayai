<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy 8/3 Giang An 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Be+Vietnam+Pro:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    :root {
      --pink: #f9a8c9;
      --pink-light: #fce4ec;
      --pink-deep: #e91e8c;
      --cream: #fff8f5;
      --rose: #ff6b9d;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: linear-gradient(160deg, #fff8fa 0%, #fce4ec 50%, #f8bbd0 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }
    #three-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }
    #confetti-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 999;
    }
    .petal {
      position: fixed; top: -40px;
      font-size: 1.2rem;
      animation: fall linear infinite;
      pointer-events: none; z-index: 1;
    }
    @keyframes fall {
      0%   { transform: translateY(-40px) rotate(0deg); opacity:0.9; }
      100% { transform: translateY(110vh) rotate(360deg); opacity:0; }
    }

    /* INTRO OVERLAY */
    #intro-overlay {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, #fff5f8 0%, #fce4ec 60%, #f8bbd0 100%);
      z-index: 100;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 1.2s ease;
    }
    #intro-canvas { width: 360px; height: 360px; }
    .intro-label {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem; font-style: italic;
      color: #c2185b; margin-top: 4px;
      letter-spacing: 0.05em;
      animation: pulse 2s ease-in-out infinite;
    }
    .intro-sub {
      font-size: 0.8rem; color: #e91e8c88;
      margin-top: 6px; letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    .skip-btn {
      margin-top: 24px; padding: 11px 32px;
      background: linear-gradient(135deg, #e91e8c, #f06292);
      border: none; border-radius: 50px;
      color: white; font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 0.9rem; cursor: pointer;
      box-shadow: 0 6px 20px rgba(233,30,140,0.35);
      transition: all 0.3s ease;
    }
    .skip-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(233,30,140,0.45); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative; padding: 40px 20px; z-index: 2;
    }
    .date-badge {
      font-family: 'Playfair Display', serif;
      font-size: 0.8rem; letter-spacing: 0.4em;
      color: var(--rose); text-transform: uppercase;
      margin-bottom: 14px; opacity: 0;
      animation: fadeUp 0.8s ease 0.3s forwards;
    }
    .main-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 10vw, 7rem); font-weight: 700;
      color: #c2185b; line-height: 1.1; text-align: center;
      opacity: 0; animation: fadeUp 0.9s ease 0.6s forwards;
    }
    .main-title span { color: var(--pink-deep); font-style: italic; }
    .subtitle {
      font-size: clamp(0.95rem, 3vw, 1.2rem); color: #ad1457;
      margin-top: 10px; font-weight: 300; letter-spacing: 0.05em;
      opacity: 0; animation: fadeUp 0.9s ease 0.9s forwards;
    }
    .photo-wrap {
      margin: 32px 0 26px; position: relative;
      opacity: 0; animation: fadeUp 1s ease 1.1s forwards;
    }
    .photo-frame {
      width: clamp(150px, 38vw, 230px);
      height: clamp(150px, 38vw, 230px);
      border-radius: 50%; overflow: hidden;
      border: 5px solid white;
      box-shadow: 0 0 0 8px rgba(249,168,201,0.35), 0 20px 50px rgba(194,24,91,0.2);
    }
    .photo-frame img { width:100%; height:100%; object-fit:cover; object-position:center top; }
    .float-flower {
      position: absolute; font-size: 1.5rem;
      animation: floatAround 3s ease-in-out infinite;
    }
    .float-flower:nth-child(1){top:-8px;right:-8px;animation-delay:0s}
    .float-flower:nth-child(2){bottom:8px;left:-12px;animation-delay:0.7s}
    .float-flower:nth-child(3){top:50%;right:-18px;animation-delay:1.4s}
    @keyframes floatAround {
      0%,100%{transform:translateY(0) rotate(0deg)}
      50%{transform:translateY(-10px) rotate(15deg)}
    }
    .message-section {
      opacity: 0; animation: fadeUp 1s ease 1.4s forwards;
      width: 100%; max-width: 460px; padding: 0 20px;
    }
    .message-card {
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(10px);
      border-radius: 24px; padding: 28px 32px;
      box-shadow: 0 8px 40px rgba(194,24,91,0.12);
      text-align: center; position: relative; overflow: hidden;
    }
    .message-card::before {
      content:'❝'; font-family:'Playfair Display',serif;
      font-size:5rem; color:var(--pink-light);
      position:absolute; top:-10px; left:14px; line-height:1;
    }
    .message-name {
      font-family:'Playfair Display',serif;
      font-size:1.5rem; font-style:italic;
      color:#c2185b; margin-bottom:10px;
    }
    .message-text { font-size:0.98rem; color:#555; line-height:1.8; font-weight:300; }
    .message-from { margin-top:14px; font-size:0.82rem; color:#bbb; letter-spacing:0.1em; }
    .message-from strong { color:var(--rose); font-weight:500; }
    .flowers-row {
      display:flex; justify-content:center; gap:10px;
      margin:24px 0 14px; flex-wrap:wrap;
      opacity:0; animation:fadeUp 1s ease 1.7s forwards;
    }
    .flower-btn {
      font-size:2rem; background:rgba(255,255,255,0.9);
      border:2px solid var(--pink-light); border-radius:50%;
      width:56px; height:56px;
      display:flex; align-items:center; justify-content:center;
      cursor:pointer;
      transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow:0 4px 14px rgba(249,168,201,0.3);
    }
    .flower-btn:hover{transform:scale(1.3) rotate(-5deg);border-color:var(--rose)}
    .cta-btn {
      margin-top:6px; padding:13px 34px;
      background:linear-gradient(135deg,#e91e8c,#f06292);
      color:white; border:none; border-radius:50px;
      font-family:'Be Vietnam Pro',sans-serif;
      font-size:0.95rem; font-weight:500; cursor:pointer;
      box-shadow:0 8px 24px rgba(233,30,140,0.35);
      transition:all 0.3s ease;
      opacity:0; animation:fadeUp 1s ease 2s forwards;
    }
    .cta-btn:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(233,30,140,0.45)}
    .footer {
      padding:18px; text-align:center; color:#e91e8c;
      font-size:0.82rem;
      opacity:0; animation:fadeUp 1s ease 2.2s forwards;
    }
    @keyframes fadeUp {
      from{opacity:0;transform:translateY(24px)}
      to{opacity:1;transform:translateY(0)}
    }
    .heart-burst {
      position:fixed; pointer-events:none;
      font-size:1.4rem; z-index:9998;
      animation:burstUp 1s ease forwards;
    }
    @keyframes burstUp {
      0%{opacity:1;transform:translateY(0) scale(1)}
      100%{opacity:0;transform:translateY(-80px) scale(0.4)}
    }
  </style>
</head>
<body>

<!-- INTRO OVERLAY -->
<div id="intro-overlay">
  <canvas id="intro-canvas"></canvas>
  <p class="intro-label">Tặng Ann bó hoa hồng này 🌹</p>
  <p class="intro-sub">Happy 8/3 · Giang An</p>
  <button class="skip-btn" onclick="skipIntro()">Vào xem ngay →</button>
</div>

<canvas id="three-canvas"></canvas>
<canvas id="confetti-canvas"></canvas>

<div class="hero">
  <p class="date-badge">08 · 03 · 2026</p>
  <h1 class="main-title">Happy<br><span>8/3</span> 🌹</h1>
  <p class="subtitle">Chúc mừng ngày Quốc tế Phụ nữ</p>
  <div class="photo-wrap">
    <div class="photo-frame">
      <img src="https://drive.google.com/thumbnail?id=1gmwt7Vo5O65zDhuk5lCe5YrAUViuJ1T_&sz=w600" alt="Giang An"/>
    </div>
    <span class="float-flower">🌹</span>
    <span class="float-flower">🌸</span>
    <span class="float-flower">🌷</span>
  </div>
  <div class="message-section">
    <div class="message-card">
      <p class="message-name">Giang An ơi,</p>
      <p class="message-text">Chúc Ann 8/3 vui vẻ &amp; hạnh phúc nhé 🌹<br>Hôm nay là ngày của Ann — xứng đáng được yêu thương thật nhiều! 💕</p>
      <p class="message-from">with love, <strong>Lộc ♥</strong></p>
    </div>
  </div>
  <div class="flowers-row">
    <button class="flower-btn" onclick="bloomFlower(this)">🌹</button>
    <button class="flower-btn" onclick="bloomFlower(this)">🌸</button>
    <button class="flower-btn" onclick="bloomFlower(this)">🌷</button>
    <button class="flower-btn" onclick="bloomFlower(this)">🌺</button>
    <button class="flower-btn" onclick="bloomFlower(this)">💐</button>
  </div>
  <button class="cta-btn" onclick="launchConfetti()">🌹 Tặng Ann bó hoa này!</button>
  <div class="footer">Made with 💕 by Lộc · battayai.com</div>
</div>

<script>
// ================================================================
// INTRO — 3D DETAILED ROSE BOUQUET
// ================================================================
(function(){
  const canvas = document.getElementById('intro-canvas');
  const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
  renderer.setSize(360,360);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled = true;

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(42,1,0.1,100);
  camera.position.set(0,2.5,9);
  camera.lookAt(0,1.5,0);

  // Rich lighting for pastel rose mood
  scene.add(new THREE.AmbientLight(0xfff5f8, 0.4));
  const key = new THREE.DirectionalLight(0xffffff, 1.2);
  key.position.set(4,8,6); scene.add(key);
  const fill = new THREE.PointLight(0xff80ab, 1.0, 25);
  fill.position.set(-4,6,4); scene.add(fill);
  const rim = new THREE.PointLight(0xfce4ec, 0.6, 20);
  rim.position.set(0,-2,6); scene.add(rim);
  const top = new THREE.PointLight(0xff4081, 0.6, 15);
  top.position.set(0,10,0); scene.add(top);

  // Pastel rose colors
  const roseColors = [
    0xf06292, 0xe91e8c, 0xf48fb1,
    0xec407a, 0xff80ab, 0xe75480,
    0xff6b9d, 0xd81b60
  ];

  // Build a detailed rose using layered petal rings
  function createRose(color, x, y, z, scale) {
    const group = new THREE.Group();
    const mat = (c) => new THREE.MeshPhongMaterial({
      color: c, shininess: 100,
      side: THREE.DoubleSide,
      transparent: true, opacity: 0.92
    });

    // Inner bud — tight spiral core
    for(let i = 0; i < 3; i++){
      const geo = new THREE.SphereGeometry(0.12, 8, 8);
      geo.scale(0.6, 1.2, 0.6);
      const m = new THREE.Mesh(geo, mat(color));
      const a = (i/3)*Math.PI*2;
      m.position.set(Math.cos(a)*0.08, 0.15+i*0.06, Math.sin(a)*0.08);
      m.rotation.y = a;
      group.add(m);
    }

    // Petal rings — 4 layers, each wider and lower
    const rings = [
      {count:5, r:0.22, y:0.08, tilt:0.5, size:[0.18,0.28,0.08]},
      {count:6, r:0.35, y:-0.02, tilt:0.7, size:[0.2,0.32,0.09]},
      {count:7, r:0.48, y:-0.14, tilt:0.85, size:[0.22,0.36,0.1]},
      {count:8, r:0.62, y:-0.28, tilt:1.0, size:[0.24,0.4,0.1]},
    ];

    rings.forEach(({count, r, y, tilt, size}, ri) => {
      const c = new THREE.Color(color);
      // Slightly darken outer rings for depth
      c.multiplyScalar(1 - ri * 0.06);
      for(let i=0; i<count; i++){
        const angle = (i/count)*Math.PI*2 + ri*0.3;
        const geo = new THREE.SphereGeometry(0.15, 8, 8);
        geo.scale(size[0]/0.15, size[1]/0.15, size[2]/0.15);
        const petal = new THREE.Mesh(geo, mat(c));
        petal.position.set(Math.cos(angle)*r, y, Math.sin(angle)*r);
        petal.rotation.y = -angle;
        petal.rotation.x = tilt * 0.4;
        group.add(petal);
      }
    });

    // Sepal (green base)
    for(let i=0;i<5;i++){
      const geo = new THREE.SphereGeometry(0.1,6,6);
      geo.scale(0.6, 2.0, 0.4);
      const sepal = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({color:0x81c784,side:THREE.DoubleSide}));
      const a = (i/5)*Math.PI*2;
      sepal.position.set(Math.cos(a)*0.3, -0.45, Math.sin(a)*0.3);
      sepal.rotation.y = a;
      sepal.rotation.x = 0.8;
      group.add(sepal);
    }

    // Stem
    const stemH = 1.8 * scale;
    const stemGeo = new THREE.CylinderGeometry(0.04*scale, 0.07*scale, stemH, 8);
    const stemMat = new THREE.MeshPhongMaterial({color:0x558b2f});
    const stem = new THREE.Mesh(stemGeo, stemMat);
    stem.position.y = -0.55 - stemH/2;
    group.add(stem);

    // Leaves — 2 per stem
    [-0.5, -0.9].forEach((hy, li) => {
      const leafGeo = new THREE.SphereGeometry(0.2*scale,8,8);
      leafGeo.scale(2.2, 0.35, 0.9);
      const leaf = new THREE.Mesh(leafGeo, new THREE.MeshPhongMaterial({color:0x66bb6a,side:THREE.DoubleSide,shininess:40}));
      leaf.position.set((li%2===0?0.35:-0.35)*scale, hy - stemH*0.3, 0);
      leaf.rotation.z = li%2===0 ? -0.5 : 0.5;
      leaf.rotation.y = li%2===0 ? 0.3 : -0.3;
      group.add(leaf);
    });

    group.scale.setScalar(scale);
    group.position.set(x, y, z);
    group.scale.setScalar(0.001); // start tiny
    scene.add(group);
    return group;
  }

  // Baby's breath (white filler flowers)
  function createFillerFlower(x, y, z) {
    const group = new THREE.Group();
    const mat = new THREE.MeshPhongMaterial({color:0xffffff, shininess:60, transparent:true, opacity:0.85});
    for(let i=0;i<6;i++){
      const geo = new THREE.SphereGeometry(0.06,6,6);
      const m = new THREE.Mesh(geo, mat);
      const a = (i/6)*Math.PI*2;
      m.position.set(Math.cos(a)*0.12, Math.sin(a)*0.12, 0);
      group.add(m);
    }
    const center = new THREE.Mesh(new THREE.SphereGeometry(0.05,6,6),
      new THREE.MeshPhongMaterial({color:0xfff9c4}));
    group.add(center);
    group.position.set(x,y,z);
    group.scale.setScalar(0.001);
    scene.add(group);
    return group;
  }

  // Arrange bouquet
  const allFlowers = [];
  const ROSES = 9;
  const positions = [
    // center roses
    [0, 2.2, 0, 0.9],
    [-0.7, 2.0, 0.2, 0.82],
    [0.7, 2.0, -0.1, 0.82],
    [0, 1.6, 0.3, 0.85],
    [-1.1, 1.5, 0, 0.75],
    [1.1, 1.5, 0.1, 0.75],
    [0.4, 1.2, 0.4, 0.7],
    [-0.4, 1.2, -0.2, 0.7],
    [0, 0.9, 0, 0.65],
  ];

  positions.forEach(([x,y,z,s], i) => {
    const color = roseColors[i % roseColors.length];
    const rose = createRose(color, x, y, z, s);
    allFlowers.push({mesh:rose, delay:i*0.18, targetScale:s, type:'rose'});
  });

  // Add filler flowers
  const fillerPos = [
    [-1.5,2.0,0.3],[1.5,1.8,-0.2],[-0.9,2.5,0.1],[0.9,2.4,0.2],
    [1.3,1.2,0.3],[-1.3,1.3,-0.1],[0.2,2.7,0.2],[-0.3,2.6,-0.1]
  ];
  fillerPos.forEach(([x,y,z]) => {
    const f = createFillerFlower(x,y,z);
    allFlowers.push({mesh:f, delay:allFlowers.length*0.1, targetScale:0.9, type:'filler'});
  });

  // Ribbon at base
  const ribbonGeo = new THREE.TorusGeometry(0.5, 0.08, 8, 20, Math.PI);
  const ribbonMat = new THREE.MeshPhongMaterial({color:0xffc1d4, shininess:120});
  const ribbon = new THREE.Mesh(ribbonGeo, ribbonMat);
  ribbon.position.set(0, -0.2, 0);
  ribbon.rotation.x = -0.3;
  scene.add(ribbon);

  // Wrap paper cone
  const coneGeo = new THREE.CylinderGeometry(0.6, 0.2, 1.4, 12, 1, true);
  const coneMat = new THREE.MeshPhongMaterial({
    color:0xfce4ec, side:THREE.DoubleSide,
    transparent:true, opacity:0.5, shininess:80
  });
  const cone = new THREE.Mesh(coneGeo, coneMat);
  cone.position.y = -0.9;
  scene.add(cone);

  // Bouquet group wrapper
  const bouquet = new THREE.Group();
  allFlowers.forEach(f => { scene.remove(f.mesh); bouquet.add(f.mesh); });
  scene.remove(ribbon); bouquet.add(ribbon);
  scene.remove(cone); bouquet.add(cone);
  bouquet.position.y = -0.8;
  scene.add(bouquet);

  let startTime = Date.now();
  let introActive = true;

  function animateIntro(){
    if(!introActive) return;
    requestAnimationFrame(animateIntro);
    const elapsed = (Date.now()-startTime)/1000;

    allFlowers.forEach(({mesh, delay, targetScale}) => {
      const t = Math.max(0, elapsed - delay);
      const raw = Math.min(1, t * 1.8);
      const eased = raw<0.5 ? 2*raw*raw : -1+(4-2*raw)*raw;
      mesh.scale.setScalar(eased * targetScale);
    });

    // Gentle sway + rotation
    bouquet.rotation.y = elapsed * 0.5 + Math.sin(elapsed*0.8)*0.15;
    bouquet.position.y = -0.8 + Math.sin(elapsed*1.0)*0.12;
    bouquet.rotation.z = Math.sin(elapsed*0.6)*0.04;

    renderer.render(scene, camera);
  }
  animateIntro();

  // Auto skip after 8s
  setTimeout(() => skipIntro(), 8000);

  window._stopIntro = () => { introActive = false; };
})();

function skipIntro(){
  if(window._stopIntro) window._stopIntro();
  const overlay = document.getElementById('intro-overlay');
  overlay.style.opacity = '0';
  overlay.style.pointerEvents = 'none';
  setTimeout(() => overlay.style.display='none', 1200);
  launchConfetti();
}

// ================================================================
// BACKGROUND — floating 3D petals
// ================================================================
(function(){
  const canvas = document.getElementById('three-canvas');
  const renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setClearColor(0x000000,0);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 100);
  camera.position.z = 10;

  scene.add(new THREE.AmbientLight(0xffffff,0.5));
  const l = new THREE.DirectionalLight(0xff80ab,0.8);
  l.position.set(5,10,5); scene.add(l);

  const pColors = [0xf8bbd0,0xf48fb1,0xfce4ec,0xff8fab,0xffd6e0,0xffffff];
  const petals3D = [];

  for(let i=0;i<25;i++){
    const geo = new THREE.SphereGeometry(0.1+Math.random()*0.08,6,6);
    geo.scale(2,0.4,1.2);
    const mat = new THREE.MeshPhongMaterial({
      color:pColors[Math.floor(Math.random()*pColors.length)],
      shininess:80, transparent:true, opacity:0.55+Math.random()*0.3
    });
    const m = new THREE.Mesh(geo,mat);
    m.position.set((Math.random()-0.5)*22,(Math.random()-0.5)*18,(Math.random()-0.5)*4);
    m.rotation.set(Math.random()*Math.PI,Math.random()*Math.PI,Math.random()*Math.PI);
    m.userData={vy:-(0.008+Math.random()*0.018),vx:(Math.random()-0.5)*0.006,vr:(Math.random()-0.5)*0.025};
    scene.add(m); petals3D.push(m);
  }

  function animateBg(){
    requestAnimationFrame(animateBg);
    petals3D.forEach(p=>{
      p.position.y+=p.userData.vy;
      p.position.x+=p.userData.vx;
      p.rotation.z+=p.userData.vr;
      p.rotation.x+=p.userData.vr*0.4;
      if(p.position.y<-12) p.position.y=12;
      if(p.position.x>13) p.position.x=-13;
      if(p.position.x<-13) p.position.x=13;
    });
    renderer.render(scene,camera);
  }
  animateBg();

  window.addEventListener('resize',()=>{
    renderer.setSize(window.innerWidth,window.innerHeight);
    camera.aspect=window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
  });
})();

// Falling emoji petals
const petalEmoji=['🌹','🌸','🌷','✿','❀'];
for(let i=0;i<12;i++){
  const p=document.createElement('div');
  p.className='petal';
  p.textContent=petalEmoji[Math.floor(Math.random()*petalEmoji.length)];
  p.style.left=Math.random()*100+'vw';
  p.style.fontSize=(0.7+Math.random()*0.9)+'rem';
  p.style.animationDuration=(8+Math.random()*10)+'s';
  p.style.animationDelay=(Math.random()*12)+'s';
  p.style.opacity=0.45+Math.random()*0.4;
  document.body.appendChild(p);
}

function bloomFlower(btn){
  btn.style.animation='none'; void btn.offsetWidth;
  btn.style.animation='bloom 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards';
  spawnHearts(btn);
}

function spawnHearts(el){
  const rect=el.getBoundingClientRect();
  const h2=['💕','💗','💖','🌹','✨'];
  for(let i=0;i<6;i++){
    const h=document.createElement('div');
    h.className='heart-burst';
    h.textContent=h2[Math.floor(Math.random()*h2.length)];
    h.style.left=(rect.left+rect.width/2+(Math.random()-0.5)*60)+'px';
    h.style.top=(rect.top-10)+'px';
    h.style.animationDelay=(i*0.08)+'s';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1200);
  }
}

document.addEventListener('click',function(e){
  if(e.target.closest('.flower-btn')||e.target.closest('.cta-btn')||e.target.closest('#intro-overlay')) return;
  const h=document.createElement('div');
  h.className='heart-burst';
  h.textContent=['💕','💗','🌹','✨'][Math.floor(Math.random()*4)];
  h.style.left=e.clientX+'px'; h.style.top=e.clientY+'px';
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),1000);
});

function launchConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth; canvas.height=window.innerHeight;
  const colors=['#f9a8c9','#e91e8c','#f48fb1','#fce4ec','#fff','#f06292','#ffb3c6'];
  const pieces=[];
  for(let i=0;i<200;i++){
    pieces.push({
      x:Math.random()*canvas.width,
      y:Math.random()*canvas.height-canvas.height,
      w:5+Math.random()*9, h:4+Math.random()*6,
      color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*Math.PI*2,
      rotSpeed:(Math.random()-0.5)*0.15,
      vy:2+Math.random()*4, vx:(Math.random()-0.5)*2, alpha:1
    });
  }
  let frame;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    let alive=false;
    pieces.forEach(p=>{
      p.y+=p.vy; p.x+=p.vx; p.rot+=p.rotSpeed;
      if(p.y>canvas.height*0.75) p.alpha-=0.015;
      if(p.alpha>0){
        alive=true;
        ctx.save(); ctx.globalAlpha=Math.max(0,p.alpha);
        ctx.translate(p.x,p.y); ctx.rotate(p.rot);
        ctx.fillStyle=p.color;
        ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        ctx.restore();
      }
    });
    if(alive) frame=requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  if(frame) cancelAnimationFrame(frame);
  draw();
  const btn=document.querySelector('.cta-btn');
  if(btn) spawnHearts(btn);
}
</script>
