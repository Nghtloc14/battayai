<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Happy 8/3 Giang An 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Be+Vietnam+Pro:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #f9a8c9;
      --pink-light: #fce4ec;
      --pink-deep: #e91e8c;
      --cream: #fff8f5;
      --rose: #ff6b9d;
      --lavender: #f3e5f5;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Be Vietnam Pro', sans-serif;
      background: var(--cream);
      min-height: 100vh;
      overflow-x: hidden;
      cursor: default;
    }

    /* ---- CANVAS CONFETTI ---- */
    #confetti-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    /* ---- FLOATING PETALS ---- */
    .petal {
      position: fixed;
      top: -40px;
      font-size: 1.4rem;
      animation: fall linear infinite;
      pointer-events: none;
      z-index: 1;
      opacity: 0.7;
    }
    @keyframes fall {
      0%   { transform: translateY(-40px) rotate(0deg); opacity: 0.8; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* ---- HERO ---- */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: 40px 20px;
      background: linear-gradient(160deg, #fff0f5 0%, #fce4ec 40%, #f8bbd0 100%);
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(249,168,201,0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(243,229,245,0.4) 0%, transparent 50%);
    }

    .date-badge {
      font-family: 'Playfair Display', serif;
      font-size: 0.85rem;
      letter-spacing: 0.35em;
      color: var(--rose);
      text-transform: uppercase;
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.8s ease 0.3s forwards;
    }

    .main-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 10vw, 7rem);
      font-weight: 700;
      color: #c2185b;
      line-height: 1.1;
      text-align: center;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.6s forwards;
      position: relative;
      z-index: 2;
    }

    .main-title span {
      color: var(--pink-deep);
      font-style: italic;
    }

    .subtitle {
      font-size: clamp(1rem, 3vw, 1.3rem);
      color: #ad1457;
      margin-top: 12px;
      font-weight: 300;
      letter-spacing: 0.05em;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.9s forwards;
      position: relative;
      z-index: 2;
    }

    /* ---- PHOTO FRAME ---- */
    .photo-wrap {
      margin: 40px 0 32px;
      position: relative;
      opacity: 0;
      animation: fadeUp 1s ease 1.1s forwards;
      z-index: 2;
    }

    .photo-frame {
      width: clamp(180px, 45vw, 260px);
      height: clamp(180px, 45vw, 260px);
      border-radius: 50%;
      overflow: hidden;
      border: 5px solid white;
      box-shadow:
        0 0 0 8px rgba(249,168,201,0.4),
        0 20px 60px rgba(194,24,91,0.2);
      position: relative;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .photo-frame::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    }

    /* Floating flowers around photo */
    .float-flower {
      position: absolute;
      font-size: 1.6rem;
      animation: floatAround 3s ease-in-out infinite;
    }
    .float-flower:nth-child(1) { top: -10px; right: -10px; animation-delay: 0s; }
    .float-flower:nth-child(2) { bottom: 10px; left: -15px; animation-delay: 0.7s; }
    .float-flower:nth-child(3) { top: 50%; right: -20px; animation-delay: 1.4s; }

    @keyframes floatAround {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-10px) rotate(15deg); }
    }

    /* ---- MESSAGE CARD ---- */
    .message-section {
      opacity: 0;
      animation: fadeUp 1s ease 1.4s forwards;
      z-index: 2;
      position: relative;
      width: 100%;
      max-width: 480px;
      padding: 0 20px;
    }

    .message-card {
      background: white;
      border-radius: 24px;
      padding: 32px 36px;
      box-shadow:
        0 8px 40px rgba(194,24,91,0.1),
        0 2px 8px rgba(194,24,91,0.06);
      position: relative;
      overflow: hidden;
      text-align: center;
    }

    .message-card::before {
      content: '❝';
      font-family: 'Playfair Display', serif;
      font-size: 5rem;
      color: var(--pink-light);
      position: absolute;
      top: -10px;
      left: 16px;
      line-height: 1;
    }

    .message-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-style: italic;
      color: #c2185b;
      margin-bottom: 16px;
    }

    .message-text {
      font-size: 1.05rem;
      color: #555;
      line-height: 1.8;
      font-weight: 300;
    }

    .message-from {
      margin-top: 20px;
      font-size: 0.85rem;
      color: #aaa;
      letter-spacing: 0.1em;
    }

    .message-from strong {
      color: var(--rose);
      font-weight: 500;
    }

    /* ---- FLOWERS BLOOM SECTION ---- */
    .flowers-row {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin: 36px 0 20px;
      opacity: 0;
      animation: fadeUp 1s ease 1.7s forwards;
      z-index: 2;
      position: relative;
      flex-wrap: wrap;
    }

    .flower-btn {
      font-size: 2.2rem;
      background: white;
      border: 2px solid var(--pink-light);
      border-radius: 50%;
      width: 60px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 4px 15px rgba(249,168,201,0.3);
    }

    .flower-btn:hover {
      transform: scale(1.25) rotate(-5deg);
      box-shadow: 0 8px 25px rgba(194,24,91,0.25);
      border-color: var(--rose);
    }

    .flower-btn.bloomed {
      animation: bloom 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    @keyframes bloom {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.5) rotate(10deg); }
      100% { transform: scale(1.2) rotate(-5deg); }
    }

    /* ---- CTA BUTTON ---- */
    .cta-btn {
      margin-top: 8px;
      padding: 14px 36px;
      background: linear-gradient(135deg, #e91e8c, #f06292);
      color: white;
      border: none;
      border-radius: 50px;
      font-family: 'Be Vietnam Pro', sans-serif;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      box-shadow: 0 8px 25px rgba(233,30,140,0.35);
      transition: all 0.3s ease;
      opacity: 0;
      animation: fadeUp 1s ease 2s forwards;
      position: relative;
      z-index: 2;
      letter-spacing: 0.03em;
    }

    .cta-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 35px rgba(233,30,140,0.45);
    }

    .cta-btn:active {
      transform: translateY(0);
    }

    /* ---- FOOTER ---- */
    .footer {
      padding: 24px;
      text-align: center;
      color: #e91e8c;
      font-size: 0.85rem;
      opacity: 0;
      animation: fadeUp 1s ease 2.2s forwards;
      position: relative;
      z-index: 2;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ---- HEART BURST on click ---- */
    .heart-burst {
      position: fixed;
      pointer-events: none;
      font-size: 1.5rem;
      z-index: 9998;
      animation: burstUp 1s ease forwards;
    }
    @keyframes burstUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(0.5); }
    }
  </style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="hero">
  <p class="date-badge">08 · 03 · 2025</p>

  <h1 class="main-title">Happy<br><span>8/3</span> 🌸</h1>
  <p class="subtitle">Chúc mừng ngày Quốc tế Phụ nữ</p>

  <!-- Photo -->
  <div class="photo-wrap">
    <div class="photo-frame">
      <img src="https://drive.google.com/thumbnail?id=1gmwt7Vo5O65zDhuk5lCe5YrAUViuJ1T_&sz=w600" alt="Giang An" />
    </div>
    <span class="float-flower">🌸</span>
    <span class="float-flower">🌺</span>
    <span class="float-flower">🌷</span>
  </div>

  <!-- Message -->
  <div class="message-section">
    <div class="message-card">
      <p class="message-name">Giang An ơi,</p>
      <p class="message-text">
        Chúc Ann 8/3 vui vẻ &amp; hạnh phúc nhé 🌸<br>
        Hôm nay là ngày của Ann — xứng đáng được yêu thương thật nhiều! 💕
      </p>
      <p class="message-from">with love, <strong>Lộc ♥</strong></p>
    </div>
  </div>

  <!-- Flower buttons -->
  <div class="flowers-row">
    <button class="flower-btn" onclick="bloomFlower(this)">🌸</button>
    <button class="flower-btn" onclick="bloomFlower(this)">🌺</button>
    <button class="flower-btn" onclick="bloomFlower(this)">🌷</button>
    <button class="flower-btn" onclick="bloomFlower(this)">🌹</button>
    <button class="flower-btn" onclick="bloomFlower(this)">💐</button>
  </div>

  <!-- CTA -->
  <button class="cta-btn" onclick="launchConfetti()">
    🎉 Tặng Ann bó hoa này!
  </button>

  <div class="footer">Made with 💕 by Lộc · battayai.com</div>
</div>

<!-- Falling petals -->
<script>
  // Generate falling petals
  const petals = ['🌸','🌺','🌷','✿','❀','💮'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petals[Math.floor(Math.random() * petals.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = (Math.random() * 10) + 's';
    p.style.opacity = 0.4 + Math.random() * 0.5;
    document.body.appendChild(p);
  }

  // Bloom flower button
  function bloomFlower(btn) {
    btn.classList.remove('bloomed');
    void btn.offsetWidth;
    btn.classList.add('bloomed');
    spawnHearts(btn);
  }

  // Spawn hearts on click
  function spawnHearts(el) {
    const rect = el.getBoundingClientRect();
    const hearts = ['💕','💗','💖','🌸','✨'];
    for (let i = 0; i < 5; i++) {
      const h = document.createElement('div');
      h.className = 'heart-burst';
      h.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      h.style.left = (rect.left + rect.width/2 + (Math.random()-0.5)*60) + 'px';
      h.style.top  = (rect.top  - 10) + 'px';
      h.style.animationDelay = (i * 0.08) + 's';
      document.body.appendChild(h);
      setTimeout(() => h.remove(), 1200);
    }
  }

  // Click anywhere = hearts
  document.addEventListener('click', function(e) {
    if (e.target.closest('.flower-btn') || e.target.closest('.cta-btn')) return;
    const h = document.createElement('div');
    h.className = 'heart-burst';
    h.textContent = ['💕','💗','🌸','✨'][Math.floor(Math.random()*4)];
    h.style.left = e.clientX + 'px';
    h.style.top  = e.clientY + 'px';
    document.body.appendChild(h);
    setTimeout(() => h.remove(), 1000);
  });

  // Confetti
  function launchConfetti() {
    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const colors = ['#f9a8c9','#e91e8c','#f48fb1','#ce93d8','#fff','#f06292','#ff80ab'];
    const pieces = [];

    for (let i = 0; i < 160; i++) {
      pieces.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        w: 6 + Math.random() * 9,
        h: 4 + Math.random() * 6,
        color: colors[Math.floor(Math.random() * colors.length)],
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.15,
        vy: 2 + Math.random() * 4,
        vx: (Math.random() - 0.5) * 2,
        alpha: 1
      });
    }

    let frame;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      let alive = false;
      pieces.forEach(p => {
        p.y += p.vy;
        p.x += p.vx;
        p.rot += p.rotSpeed;
        if (p.y > canvas.height * 0.75) p.alpha -= 0.018;
        if (p.alpha > 0) {
          alive = true;
          ctx.save();
          ctx.globalAlpha = Math.max(0, p.alpha);
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
          ctx.restore();
        }
      });
      if (alive) frame = requestAnimationFrame(draw);
      else ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    if (frame) cancelAnimationFrame(frame);
    draw();

    // Spawn hearts from button
    const btn = document.querySelector('.cta-btn');
    spawnHearts(btn);
  }

  // Auto launch confetti after load
  setTimeout(launchConfetti, 2400);
</script>
</body>
</html>
